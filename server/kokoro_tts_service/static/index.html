<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TJI 云端语音调试台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">云端语音</p>
          <h1>喊话器语音调试台</h1>
        </div>
        <div class="status" id="serviceStatus">检测中</div>
      </header>

      <section class="workspace">
        <form class="panel composer" id="ttsForm">
          <label class="field">
            <span>播报文字</span>
            <textarea id="textInput" maxlength="500">前方危险，请立即撤离</textarea>
          </label>

          <div class="grid two">
            <label class="field">
              <span>采样率</span>
              <select id="sampleRateInput">
                <option value="8000" selected>8000 Hz - 喊话器</option>
                <option value="16000">16000 Hz - 对比试听</option>
                <option value="24000">24000 Hz - 原始清晰度</option>
              </select>
            </label>

            <label class="field">
              <span>语速 <output id="speedValue">1.00</output></span>
              <input id="speedInput" type="range" min="0.75" max="1.25" step="0.01" value="1.00" />
            </label>
          </div>

          <div class="actions">
            <button class="primary" type="submit" id="generateButton">生成试听</button>
            <button type="button" id="downloadButton" disabled>下载 WAV</button>
          </div>

          <audio id="player" controls></audio>
          <p class="message" id="message">选择音色后生成，浏览器播放的是服务返回的同一份音频。</p>
        </form>

        <aside class="panel voices">
          <div class="section-title">
            <h2>音色</h2>
            <span id="voiceCount">0 种</span>
          </div>
          <div class="tabs" role="tablist" aria-label="音色分类">
            <button class="tab active" type="button" data-gender="全部">全部</button>
            <button class="tab" type="button" data-gender="女声">女声</button>
            <button class="tab" type="button" data-gender="男声">男声</button>
          </div>
          <div class="voice-list" id="voiceList"></div>
        </aside>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
